services:
  oracle-db:
    image: gvenzl/oracle-xe:21-slim
    container_name: piedraazul-oracle-db
    restart: unless-stopped
    environment:
      ORACLE_PASSWORD: oracle
      APP_USER: PIEDRAAZUL
      APP_USER_PASSWORD: piedraazul
    ports:
      - "1522:1521"
    volumes:
      - oracle_data:/opt/oracle/oradata
    networks:
      - piedraazul-network

  keycloak:
    image: quay.io/keycloak/keycloak:25.0.6
    container_name: piedraazul-keycloak
    command: start-dev --import-realm
    restart: unless-stopped
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8085:8080"
    volumes:
      - ./keycloak/piedrazul-realm.json:/opt/keycloak/data/import/piedrazul-realm.json
    networks:
      - piedraazul-network

  notification-service:
    build:
      context: ./piedraazul-notification-service
      dockerfile: Dockerfile
    container_name: piedraazul-notification-service
    restart: unless-stopped
    depends_on:
      - oracle-db
    environment:
      SPRING_DATASOURCE_URL: jdbc:oracle:thin:@//oracle-db:1521/XEPDB1
      SPRING_DATASOURCE_USERNAME: PIEDRAAZUL
      SPRING_DATASOURCE_PASSWORD: piedraazul
      NOTIFICATION_MAIL_ENABLED: "false"
      NOTIFICATION_MAIL_FROM: no-reply@piedraazul.com
    ports:
      - "8082:8082"
    networks:
      - piedraazul-network

  agenda-service:
    build:
      context: ./piedraazul-agenda-service
      dockerfile: Dockerfile
    container_name: piedraazul-agenda-service
    restart: unless-stopped
    depends_on:
      - oracle-db
      - keycloak
      - notification-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:oracle:thin:@//oracle-db:1521/XEPDB1
      SPRING_DATASOURCE_USERNAME: PIEDRAAZUL
      SPRING_DATASOURCE_PASSWORD: piedraazul

      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/PiedrAzul/protocol/openid-connect/certs
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/PiedrAzul/protocol/openid-connect/certs

      KEYCLOAK_TOKEN_URI: http://keycloak:8080/realms/PiedrAzul/protocol/openid-connect/token
      KEYCLOAK_CLIENT_ID: agenda-service

      KEYCLOAK_BASE_URL: http://keycloak:8080
      KEYCLOAK_REALM: PiedrAzul
      KEYCLOAK_ADMIN_TOKEN_URI: http://keycloak:8080/realms/master/protocol/openid-connect/token
      KEYCLOAK_ADMIN_USERNAME: admin
      KEYCLOAK_ADMIN_PASSWORD: admin

      NOTIFICATION_SERVICE_URL: http://notification-service:8082
    ports:
      - "8081:8081"
    networks:
      - piedraazul-network

volumes:
  oracle_data:

networks:
  piedraazul-network:
    driver: bridge