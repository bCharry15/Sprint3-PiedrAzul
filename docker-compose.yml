services:
  mariadb-agenda:
    image: mariadb:11.4
    container_name: piedraazul-mariadb-agenda
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: piedraazul_agenda
      MARIADB_USER: piedraazul
      MARIADB_PASSWORD: piedraazul
    ports:
      - "3307:3306"
    volumes:
      - mariadb_agenda_data:/var/lib/mysql
    networks:
      - piedraazul-network

  mariadb-notification:
    image: mariadb:11.4
    container_name: piedraazul-mariadb-notification
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: piedraazul_notifications
      MARIADB_USER: piedraazul
      MARIADB_PASSWORD: piedraazul
    ports:
      - "3308:3306"
    volumes:
      - mariadb_notification_data:/var/lib/mysql
    networks:
      - piedraazul-network

  keycloak:
    image: quay.io/keycloak/keycloak:25.0.6
    container_name: piedraazul-keycloak
    command: start-dev --import-realm
    restart: unless-stopped
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8085:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./keycloak/piedrazul-realm.json:/opt/keycloak/data/import/piedrazul-realm.json
    networks:
      - piedraazul-network

  notification-service:
    build:
      context: ./piedraazul-notification-service
      dockerfile: Dockerfile
    container_name: piedraazul-notification-service
    restart: unless-stopped
    depends_on:
      - mariadb-notification
    environment:
      SPRING_DATASOURCE_URL: jdbc:mariadb://mariadb-notification:3306/piedraazul_notifications
      SPRING_DATASOURCE_USERNAME: piedraazul
      SPRING_DATASOURCE_PASSWORD: piedraazul
      NOTIFICATION_MAIL_ENABLED: "false"
      NOTIFICATION_MAIL_FROM: no-reply@piedraazul.com
    ports:
      - "8082:8082"
    networks:
      - piedraazul-network

  agenda-service:
    build:
      context: ./piedraazul-agenda-service
      dockerfile: Dockerfile
    container_name: piedraazul-agenda-service
    restart: unless-stopped
    depends_on:
      - mariadb-agenda
      - keycloak
      - notification-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:mariadb://mariadb-agenda:3306/piedraazul_agenda
      SPRING_DATASOURCE_USERNAME: piedraazul
      SPRING_DATASOURCE_PASSWORD: piedraazul

      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/PiedrAzul
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/PiedrAzul/protocol/openid-connect/certs
      KEYCLOAK_TOKEN_URI: http://keycloak:8080/realms/PiedrAzul/protocol/openid-connect/token
      KEYCLOAK_CLIENT_ID: agenda-service

      KEYCLOAK_BASE_URL: http://keycloak:8080
      KEYCLOAK_REALM: PiedrAzul
      KEYCLOAK_ADMIN_TOKEN_URI: http://keycloak:8080/realms/master/protocol/openid-connect/token
      KEYCLOAK_ADMIN_USERNAME: admin
      KEYCLOAK_ADMIN_PASSWORD: admin

      NOTIFICATION_SERVICE_URL: http://notification-service:8082
    ports:
      - "8081:8081"
    networks:
      - piedraazul-network

volumes:
  mariadb_agenda_data:
  mariadb_notification_data:
  keycloak_data:

networks:
  piedraazul-network:
    driver: bridge