spring.application.name=piedraazul-notification-service
server.port=8082

spring.datasource.url=jdbc:mariadb://localhost:3306/piedraazul_notifications
spring.datasource.username=appuser
spring.datasource.password=123456
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.paths-to-match=/api/**

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

notification.mail.enabled=${NOTIFICATION_MAIL_ENABLED:false}
notification.mail.from=${NOTIFICATION_MAIL_FROM:no-reply@piedraazul.com}